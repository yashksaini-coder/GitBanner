name: GitBanner Profile Card
description: 'Generate a personalized GitHub stats banner: commits, stars, languages, persona, top projects (SVG + PNG).'
author: yashksaini-coder
branding:
  icon: bar-chart-2
  color: purple

inputs:
  github-token:
    description: |
      A GitHub personal access token used to query the GraphQL/REST APIs.
      Required scopes: read:user (and repo if include-private is true).
      Defaults to github.token in workflows, but a PAT is recommended for full data.
    required: true

  username:
    description: GitHub login to render. Defaults to the repository owner.
    required: false
    default: ''

  theme:
    description: 'Theme name. Currently supported: dark.'
    required: false
    default: dark

  format:
    description: Output format — svg, png, or both.
    required: false
    default: both

  output-path:
    description: Output path without extension. Files are written as <output-path>.svg and <output-path>.png.
    required: false
    default: gitbanner

  include-private:
    description: Include private repository stats (requires repo scope on the token).
    required: false
    default: 'false'

  exclude:
    description: |
      Comma-separated list of repository names to exclude from per-repo
      calculations (top lists, languages, project highlights). The user's
      profile README repo (a repo named exactly after the user) is always
      excluded automatically.
    required: false
    default: ''

  ignore-languages:
    description: |
      Comma-separated list of language names to exclude from the
      "Languages Used" count, the top-languages list, and the
      "Go-to language" pick. Matched case-insensitively. Useful for
      hiding auto-generated content like "Jupyter Notebook" outputs
      or vendored code that GitHub's detection counts but you don't
      write.
    required: false
    default: ''

  commit:
    description: When true, commit and push the regenerated card if it changed.
    required: false
    default: 'true'

  commit-message:
    description: Commit message used when committing the regenerated card.
    required: false
    default: 'chore: refresh GitBanner stats'

outputs:
  card-path:
    description: Filesystem path of the primary generated card (SVG by default, PNG if format=png).

runs:
  using: node20
  main: dist/index.js
