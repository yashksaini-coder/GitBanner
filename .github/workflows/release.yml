name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Semantic version to release (without v prefix, e.g. 1.0.0 or 1.0.0-rc.1)'
        required: true
        type: string
      release_type:
        description: 'Release type'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - prerelease

jobs:
  validate:
    name: Validate and run CI
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      tag: ${{ steps.normalize.outputs.tag }}
      major: ${{ steps.normalize.outputs.major }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Normalize and validate the version
        id: normalize
        env:
          VERSION_INPUT: ${{ inputs.version }}
        run: |
          # Strip a leading 'v' if the user typed it, then validate semver.
          ver="${VERSION_INPUT#v}"
          if ! echo "$ver" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?$'; then
            echo "::error::'$ver' is not valid semver. Use e.g. 1.0.0 or 1.0.0-rc.1"
            exit 1
          fi
          tag="v$ver"
          major="v${ver%%.*}"
          echo "tag=$tag"     >> "$GITHUB_OUTPUT"
          echo "major=$major" >> "$GITHUB_OUTPUT"
          echo "Releasing $tag (major track $major)"

      - name: Ensure tag does not already exist
        env:
          TAG: ${{ steps.normalize.outputs.tag }}
        run: |
          if git ls-remote --tags origin | grep -q "refs/tags/$TAG$"; then
            echo "::error::Tag $TAG already exists on origin. Pick a new version."
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - name: Fail if dist/ is out of sync
        run: |
          if ! git diff --quiet --exit-code dist/; then
            echo "::error::dist/ is out of sync with src/. Rebuild on main, commit, and re-run."
            git diff --stat dist/
            exit 1
          fi

  release:
    name: Tag and publish release
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create the GitHub Release (creates the tag atomically)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.validate.outputs.tag }}
          IS_PRE: ${{ inputs.release_type == 'prerelease' }}
          TARGET_SHA: ${{ github.sha }}
        run: |
          # gh release create creates the tag on origin as part of the release.
          # If anything fails, no tag exists and the workflow can be re-run cleanly.
          flags=(--title "$TAG" --generate-notes --target "$TARGET_SHA")
          if [ "$IS_PRE" = "true" ]; then
            flags+=(--prerelease)
          fi
          gh release create "$TAG" "${flags[@]}"

      - name: Move the floating major-version tag (stable releases only)
        if: inputs.release_type == 'release'
        env:
          MAJOR: ${{ needs.validate.outputs.major }}
          TARGET_SHA: ${{ github.sha }}
        run: |
          # Point the floating major tag (e.g. v1) at the same commit the release was cut from.
          # Force-push because that's how floating major-version tags are designed to work.
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "$MAJOR" "$TARGET_SHA"
          git push origin "$MAJOR" --force
