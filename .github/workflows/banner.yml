name: Refresh GitBanner

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: ./
        with:
          github-token: ${{ secrets.GITBANNER_PAT || github.token }}
          username: ${{ github.repository_owner }}
          theme: dark
          format: both
          output-path: out/gitbanner
          commit: 'false'
      - uses: actions/upload-artifact@v4
        with:
          name: gitbanner
          path: out/gitbanner.*
          if-no-files-found: error
